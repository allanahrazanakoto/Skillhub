services:
  # ─────────────────────────────────────────
  # MICROSERVICE AUTH — Spring Boot (TP5 adapté)
  # Gère : inscription, connexion HMAC, validation token
  # Les autres services appellent http://auth:8080 en interne
  # ─────────────────────────────────────────
  auth:
    build:
      context: ./skillhub_auth
    container_name: skillhub_auth
    ports:
      # Port hôte 8080 → port conteneur 8080
      - "8080:8080"
    environment:
      # Clé maître pour le chiffrement AES-GCM des mots de passe
      APP_MASTER_KEY: ${APP_MASTER_KEY:-skillhub_master_key_change_in_prod}
      # Connexion MySQL : base séparée "authdb" pour ne pas mélanger avec SkillHub
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/authdb
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-skillhub}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-skillhubpass}
    depends_on:
      mysql:
        # On attend que MySQL soit vraiment prête avant de démarrer Spring Boot
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 512m
    cpus: "0.5"

  api:
    build:
      context: ./skillhub_back
    container_name: skillhub_back
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_URL: http://localhost:8000
      SESSION_DRIVER: file
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: skillhub
      DB_USERNAME: skillhub
      DB_PASSWORD: skillhubpass
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: skillhub_activity_log
      MONGODB_COLLECTION: activity_logs
    volumes:
      - ./skillhub_back/storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_started
      # Laravel dépend aussi du microservice auth pour valider les tokens
      auth:
        condition: service_started

  mysql:
    image: mysql:8.0
    container_name: skillhub_mysql
    environment:
      MYSQL_DATABASE: skillhub
      MYSQL_USER: skillhub
      MYSQL_PASSWORD: skillhubpass
      MYSQL_ROOT_PASSWORD: rootpass
      # Évite les erreurs de timezone au démarrage
      MYSQL_INITDB_SKIP_TZINFO: "1"
    # Port hôte 13306 → conteneur 3306 (évite les conflits avec MySQL local)
    # Depuis Windows : localhost:13306. En Docker interne : mysql:3306
    ports:
      - "13306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      # Ce script SQL s'exécute au 1er démarrage → crée la base authdb pour Spring Boot
      - ./BDD/init_authdb.sql:/docker-entrypoint-initdb.d/init_authdb.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  mongo:
    image: mongo:7.0
    container_name: skillhub_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  frontend:
    build:
      context: ./skillhub_front
      args:
        VITE_API_URL: /api
    container_name: skillhub_front
    ports:
      - "5173:80"
    environment:
      VITE_API_URL: /api
    depends_on:
      - api

volumes:
  mysql-data:
  mongo-data:
