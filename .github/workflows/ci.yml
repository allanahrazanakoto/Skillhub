# CI uniquement sur la branche dev (aucun déclenchement sur main).
# Pipeline limité au build/test Spring Boot + Laravel + analyse SonarCloud.
# Si tous les fichiers modifiés sont ignorés (paths-ignore), le workflow ne s'exécute pas.

name: CI Pipeline

on:
  push:
    branches:
      - dev
    paths-ignore:
      - "**/*.md"
      - "Doc/**"
  pull_request:
    branches:
      - dev
    paths-ignore:
      - "**/*.md"
      - "Doc/**"

permissions:
  contents: read

jobs:
  auth:
    name: Auth — Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: skillhub_auth

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set APP_MASTER_KEY for CI
        run: echo "APP_MASTER_KEY=test_master_key_for_ci_only" >> "$GITHUB_ENV"

      - name: Ensure Maven wrapper is executable
        run: chmod +x mvnw

      - name: Run Maven tests
        run: ./mvnw test

  backend:
    name: Backend — Install & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: skillhub_back

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          # Ne pas activer le paquet apt "mongodb" : souvent ext-mongodb 2.1.4, incompatible avec
          # mongodb/mongodb 2.2 (exige ext-mongodb ^2.2). Les tests n’utilisent pas Mongo sans MONGODB_URI.
          extensions: mbstring, xml, pdo_sqlite, sqlite3, bcmath, intl, openssl, zip
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --ignore-platform-req=ext-mongodb

      - name: Copy environment
        run: cp .env.example .env

      - name: Generate APP_KEY
        run: php artisan key:generate

      - name: Run PHPUnit (Unit + Feature)
        run: |
          mkdir -p reports
          ./vendor/bin/phpunit --log-junit reports/junit.xml

      - name: Upload PHPUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpunit-junit
          path: skillhub_back/reports/junit.xml
