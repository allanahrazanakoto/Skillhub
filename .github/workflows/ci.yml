# CI uniquement sur la branche dev (aucun déclenchement sur main).
# CD (push GHCR) : uniquement sur push vers dev — nécessite permissions packages: write (GITHUB_TOKEN).
# Si tous les fichiers modifiés sont ignorés (paths-ignore), le workflow ne s'exécute pas.

name: CI Pipeline

on:
  push:
    branches:
      - dev
    paths-ignore:
      - "**/*.md"
      - "Doc/**"
  pull_request:
    branches:
      - dev
    paths-ignore:
      - "**/*.md"
      - "Doc/**"

permissions:
  contents: read

jobs:
  auth:
    name: Auth — Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: skillhub_auth

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set APP_MASTER_KEY for CI
        run: echo "APP_MASTER_KEY=test_master_key_for_ci_only" >> "$GITHUB_ENV"

      - name: Run Maven tests
        run: ./mvnw test

  backend:
    name: Backend — Install & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: skillhub_back

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          # Ne pas activer le paquet apt "mongodb" : souvent ext-mongodb 2.1.4, incompatible avec
          # mongodb/mongodb 2.2 (exige ext-mongodb ^2.2). Les tests n’utilisent pas Mongo sans MONGODB_URI.
          extensions: mbstring, xml, pdo_sqlite, sqlite3, bcmath, intl, openssl, zip
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --ignore-platform-req=ext-mongodb

      - name: Copy environment
        run: cp .env.example .env

      - name: Generate APP_KEY
        run: php artisan key:generate

      - name: Run PHPUnit (Unit + Feature)
        run: |
          mkdir -p reports
          ./vendor/bin/phpunit --log-junit reports/junit.xml

      - name: Upload PHPUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpunit-junit
          path: skillhub_back/reports/junit.xml

  # Stack locale = 4 services (cf. docker-compose.yml) :
  # - auth + api : images construites depuis les Dockerfiles du dépôt
  # - mysql + mongo : images officielles (pull Docker Hub), pas de Dockerfile projet
  docker-images:
    name: Docker — Stack 4 services (build 2 + pull 2)
    runs-on: ubuntu-latest
    needs: [auth, backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Valider docker-compose.yml
        run: docker compose -f docker-compose.yml config --quiet

      - name: Images officielles MySQL & Mongo (2/4 services — pas de Dockerfile projet)
        run: docker compose -f docker-compose.yml pull mysql mongo

      - name: Build images custom auth & api (2/4 services — Dockerfiles du repo)
        run: |
          docker build -t skillhub-auth:${{ github.sha }} ./skillhub_auth
          docker build -t skillhub-api:${{ github.sha }} ./skillhub_back

  docker-push-ghcr:
    name: CD — Push images to GHCR (dev only)
    runs-on: ubuntu-latest
    needs: [docker-images]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Registry namespace (GHCR exige minuscules)
        id: ghcr
        run: echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build & push auth image
        run: |
          IMAGE_AUTH=ghcr.io/${{ steps.ghcr.outputs.owner_lc }}/skillhub-auth
          docker build -t "${IMAGE_AUTH}:${{ github.sha }}" -t "${IMAGE_AUTH}:latest" ./skillhub_auth
          docker push "${IMAGE_AUTH}:${{ github.sha }}"
          docker push "${IMAGE_AUTH}:latest"

      - name: Build & push API image
        run: |
          IMAGE_API=ghcr.io/${{ steps.ghcr.outputs.owner_lc }}/skillhub-api
          docker build -t "${IMAGE_API}:${{ github.sha }}" -t "${IMAGE_API}:latest" ./skillhub_back
          docker push "${IMAGE_API}:${{ github.sha }}"
          docker push "${IMAGE_API}:latest"

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [auth, backend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, pdo_sqlite, sqlite3, bcmath, intl, openssl, zip
          coverage: xdebug

      - name: Prepare backend coverage
        working-directory: skillhub_back
        run: |
          composer install --no-interaction --prefer-dist --ignore-platform-req=ext-mongodb
          cp .env.example .env
          php artisan key:generate
          mkdir -p reports
          ./vendor/bin/phpunit --coverage-clover reports/coverage.xml

      - name: Prepare auth binaries and coverage
        working-directory: skillhub_auth
        env:
          APP_MASTER_KEY: test_master_key_for_ci_only
        run: |
          ./mvnw test

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          projectBaseDir: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
